name: LinkedIn Post (Mon/Wed/Fri)

on:
  schedule:
    - cron: '30 4 * * 1'  # Monday    9:00 AM IST (4:30 UTC)
    - cron: '30 4 * * 3'  # Wednesday 9:00 AM IST
    - cron: '30 4 * * 5'  # Friday    9:00 AM IST
  workflow_dispatch:        # Allow manual trigger from GitHub

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run LinkedIn Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: python agents/linkedin_agent.py

      - name: Save post log to repo
        run: |
          git config user.name "Aakash's LinkedIn Agent"
          git config user.email "akashgupta8163@gmail.com"
          git add data/linkedin_log.json || true
          git diff --staged --quiet || git commit -m "LinkedIn post log update $(date +'%Y-%m-%d')"
          git push || true
